baseURL: https://example.docsy.dev
title: Do11y Test - Docsy

# Language settings
contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

enableRobotsTXT: false

# Module imports
module:
  imports:
    - path: github.com/google/docsy/theme

services:
  googleAnalytics:
    id: G-XXXXXXXXXX

# Highlighting config
pygmentsCodeFences: true
pygmentsUseClasses: false
pygmentsUseClassic: false
pygmentsStyle: tango

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango
    noClasses: false

# Everything below this are Site Params
outputs:
  home: [HTML, RSS]
  section: [HTML, RSS]

params:
  copyright:
    authors: Do11y Test
    from_year: 2026
    to_year: present
  ui:
    breadcrumb_disable: false
    navbar_logo: true
    navbar_translucent_over_cover_disable: false
    sidebar_menu_foldable: true
    sidebar_menu_compact: false
    sidebar_search_disable: false
    showLightDarkModeMenu: true
    readingtime:
      enable: false
    feedback:
      enable: true
      yes: >-
        Glad to hear it! Please
        <a href="https://github.com/manototh/do11y/issues/new">tell us how we
        can improve</a>.
      no: >-
        Sorry to hear that. Please
        <a href="https://github.com/manototh/do11y/issues/new">tell us how we
        can improve</a>.
  btn-lg: class="btn btn-lg btn-{1}" role="button"
